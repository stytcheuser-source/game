<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Spy: Anti-Gravity 🌈✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #2196f3; --yellow: #ffeb3b; --red: #f44336; --dark: #121212; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Lilita One', cursive; color: white; text-transform: uppercase; background: var(--dark); }
        
        /* Фон с частицами - магия антигравитации ✨ */
        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        #app { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .screen { display: flex; flex-direction: column; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* Карточки и UI в стиле Brawl Stars 🏆🔑 */
        .card { 
            background: rgba(33, 150, 243, 0.9); 
            padding: 30px; 
            border: 6px solid #000; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            backdrop-filter: blur(5px); 
            margin: 0 auto; 
            width: 100%; 
            max-width: 400px; 
            position: relative; /* Для радужного блика ✨ */
        }
        
        /* Радужный блик на карточке ✨ */
        .card::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            border-radius: 25px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(15px);
        }
        
        input { padding: 12px; font-size: 1.2rem; border-radius: 8px; border: 4px solid #000; margin-bottom: 10px; width: 80%; font-family: inherit; text-align: center; }
        
        .btn { 
            padding: 12px 20px; 
            font-size: 1.2rem; 
            border: 4px solid #000; 
            border-radius: 10px; 
            cursor: pointer; 
            font-family: inherit; 
            transition: transform 0.1s, box-shadow 0.1s; 
            display: inline-block; 
            margin: 5px; 
            position: relative; /* Для блика ✨ */
            overflow: hidden;
        }
        
        /* Радужный блик на кнопках ✨ */
        .btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: transform 0.5s;
        }
        .btn:hover::after { transform: rotate(45deg) translate(50%, 50%); }

        .btn.yellow { background: var(--yellow); color: #000; }
        .btn.green { background: #4caf50; color: #fff; }
        .btn.red { background: var(--red); color: #fff; width: 100%; margin-top: 15px; }
        .btn:active { transform: scale(0.95); box-shadow: inset 0 3px 5px rgba(0,0,0,0.3); }

        /* Лобби 👥 */
        #lobby-layout { display: flex; gap: 20px; width: 100%; max-width: 800px; margin: 0 auto; }
        .sidebar { background: rgba(0,0,0,0.8); border: 4px solid var(--blue); border-radius: 15px; width: 250px; padding: 15px; }
        .player-item { background: #222; border: 2px solid #444; margin: 5px 0; padding: 10px; border-radius: 8px; font-size: 1.1rem;}
        .content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        
        /* Карточка роли 👀🚀 */
        .role-card { background: #ff9800; border: 6px solid #fff; padding: 30px; border-radius: 20px; text-align: center; width: 100%; box-sizing: border-box; transition: background-color 0.3s; }
        .spy-mode { background: var(--red); }
        .brawler-name { font-size: 3.5rem; margin: 10px 0; -webkit-text-stroke: 2px black; text-shadow: 2px 2px 0 #000; }
        .role-title { font-size: 2rem; -webkit-text-stroke: 1px black;}

        @media (max-width: 600px) {
            #lobby-layout { flex-direction: column; }
            .sidebar { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div id="app">
        <div id="auth-screen" class="screen">
            <div class="card">
                <h1>BRAWL SPY 👥👀</h1>
                <input type="text" id="nick-input" placeholder="ТВОЙ НИК..." maxlength="12">
                <div>
                    <button onclick="Game.createRoom()" class="btn yellow">СОЗДАТЬ 🚀</button>
                    <button onclick="document.getElementById('join-box').classList.remove('hidden')" class="btn green">ВОЙТИ 🚪</button>
                </div>
                <div id="join-box" class="hidden" style="margin-top: 15px;">
                    <input type="text" id="room-input" placeholder="КОД КОМНАТЫ">
                    <button onclick="Game.joinRoom()" class="btn yellow">GO 🏁</button>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="screen hidden">
            <div id="lobby-layout">
                <div class="sidebar">
                    <h3>БОЙЦЫ 👥: <span id="p-count">1</span></h3>
                    <div id="player-list"></div>
                </div>
                <div class="content">
                    <div class="card" style="margin-bottom: 20px; max-width: 100%;">
                        <h2>КОД КОМНАТЫ 🔑: <span id="display-room-id" style="color: var(--yellow);">...</span></h2>
                        <div id="host-controls" class="hidden">
                            <button id="start-btn" onclick="Game.startRound()" class="btn green" style="width: 100%;">НАЧАТЬ 🏁🚀</button>
                            <button id="restart-btn" onclick="Game.resetRound()" class="btn yellow hidden" style="width: 100%;">НОВЫЙ РАУНД 🔄</button>
                        </div>
                    </div>

                    <div id="game-reveal" class="hidden" style="width: 100%;">
                        <div class="role-card" id="role-card-bg">
                            <h2 id="role-title" class="role-title">РОЛЬ 👀</h2>
                            <div id="brawler-name" class="brawler-name">??? 🃏</div>
                            <p style="font-size: 1.1rem; margin-top: 10px;">Обсуждайте и найдите шпиона! 💬👀</p>
                            <button onclick="Game.hideRoleLocally()" class="btn red">СКРЫТЬ РОЛЬ 🙈</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
// --- Анимация частиц (Антигравитация) 🌈✨ ---
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];
let mouse = { x: null, y: null, radius: 150 }; // Радиус притяжения🧲

// Отслеживаем мышь🐭 и касания👆
window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); }
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 0.5; // Частицы мельче
        // Радужные цвета🌈 через hsl()
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`; 
        this.baseX = this.x; // Начальная позиция⚓
        this.baseY = this.y;
        this.density = (Math.random() * 20) + 1; // "Плотность" для разной скорости притяжения🚀
    }
    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        
        // Притяжение🧲 к курсору
        if (mouse.x != null && distance < mouse.radius) {
            let forceDirectionX = dx / distance;
            let forceDirectionY = dy / distance;
            let force = (mouse.radius - distance) / mouse.radius; // Сила зависит от расстояния📏
            let directionX = forceDirectionX * force * this.density;
            let directionY = forceDirectionY * force * this.density;
            this.x += directionX;
            this.y += directionY;
        } else {
            // Плавный возврат⚓ на свои места
            if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 20;
            if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 20;
        }
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particlesArray = [];
    // Количество частиц зависит от размера экрана💻📱
    let numberOfParticles = (canvas.width * canvas.height) / 2000; 
    for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Очищаем canvas🖌️
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
    }
    requestAnimationFrame(animateParticles); // Запускаем следующий кадр🎞️
}
resizeCanvas(); animateParticles(); // Инициализация🏁 и запуск анимации🎬

// --- Игровая логика P2P 👥💬👀 ---
const BRAWLERS = ["LEON 🦎", "SPIKE 🌵", "CROW 🦅", "MORTIS 🦇", "SHELLY 🔫", "COLT 🤠", "EL PRIMO 💪", "EDGAR 🧣", "SURGE 🤖", "AMBER 🔥"];

const Game = {
    peer: null,
    myNick: "",
    isHost: false,
    players: [], // Массив объектов {nick: "Имя", conn: PeerConnection (null для хоста)}

    // ХОСТ💻: Создание комнаты 🚀
    createRoom() {
        this.myNick = document.getElementById('nick-input').value.trim().toUpperCase() || "HOST 💻";
        this.isHost = true;
        const roomId = Math.floor(1000 + Math.random() * 9000).toString(); // Генерируем 4-значный код🔑
        
        // Создаем Peer с уникальным ID (brawl-XXXX) 🔑
        this.peer = new Peer('brawl-' + roomId);
        
        this.peer.on('open', (id) => {
            document.getElementById('display-room-id').innerText = roomId;
            // Хост💻 ВСЕГДА первый в списке (индекс 0)
            this.players = [{ nick: this.myNick, conn: null }]; 
            this.updateUI();
            this.showLobby();
        });

        // Слушаем входящие подключения🔌 (как центральный хост💻 в P2P схеме)
        this.peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'JOIN') {
                    // Добавляем игрока👥 в список
                    this.players.push({ nick: data.nick, conn: conn });
                    this.broadcastList(); // Рассылаем обновленный список всем📢
                }
            });
            // Обработка отключения🔌 игрока👥
            conn.on('close', () => {
                this.players = this.players.filter(p => p.conn !== conn);
                this.broadcastList(); // Рассылаем обновленный список всем📢
            });
        });
    },

    // ИГРОК👥: Подключение🚪
    joinRoom() {
        this.myNick = document.getElementById('nick-input').value.trim().toUpperCase() || "PLAYER 👥";
        const roomId = document.getElementById('room-input').value.trim();
        this.isHost = false;

        this.peer = new Peer(); // Создаем Peer без фиксированного ID🔑
        this.peer.on('open', () => {
            // Подключаемся🔌 к хосту💻 по его ID (brawl-XXXX) 🔑
            const conn = this.peer.connect('brawl-' + roomId);
            conn.on('open', () => {
                conn.send({ type: 'JOIN', nick: this.myNick }); // Отправляем запрос на вход🚪
                document.getElementById('display-room-id').innerText = roomId;
                this.showLobby();
            });
            // Слушаем данные от хоста💻 (как клиент в P2P схеме)
            conn.on('data', (data) => {
                if (data.type === 'LIST') {
                    // Обновляем локальный список игроков👥
                    this.players = data.list.map(n => ({ nick: n }));
                    this.updateUI();
                }
                if (data.type === 'ROLE') this.displayRole(data.role, data.brawler); // Показываем роль👀🃏
                if (data.type === 'RESET') document.getElementById('game-reveal').classList.add('hidden'); // Скрываем роль🙈🔄
            });
        });
    },

    // ХОСТ💻📢: Рассылка списка игроков👥
    broadcastList() {
        if (!this.isHost) return;
        const names = this.players.map(p => p.nick);
        // Отправляем список всем подключенным игрокам👥🔌
        this.players.forEach(p => { if (p.conn) p.conn.send({ type: 'LIST', list: names }); });
        this.updateUI(); // Обновляем свой UI💻
    },

    // ХОСТ💻🚀🏁: Старт раунда и распределение ролей 👀🃏
    startRound() {
        // Проверки перед стартом🏁🚀
        if (!this.isHost || this.players.length < 2) return alert("Нужно минимум 2 игрока! 👥❌");
        
        const brawler = BRAWLERS[Math.floor(Math.random() * BRAWLERS.length)]; // Выбираем бравлера🃏
        // Алгоритм строго выбирает ОДНОГО шпиона👀🃏
        const spyIndex = Math.floor(Math.random() * this.players.length); 

        this.players.forEach((p, index) => {
            const isSpy = (index === spyIndex); // Проверка на шпиона👀🃏
            const rolePayload = {
                type: 'ROLE',
                role: isSpy ? 'ШПИОН 👀' : 'БОЕЦ 👥',
                brawler: isSpy ? '??? 🃏' : brawler // Шпион👀 не знает бравлера🃏
            };

            if (p.conn === null) {
                this.displayRole(rolePayload.role, rolePayload.brawler); // Показываем хосту💻
            } else {
                p.conn.send(rolePayload); // Отправляем клиенту👥🔌
            }
        });

        // Переключаем кнопки управления
        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('restart-btn').classList.remove('hidden');
    },

    // ХОСТ💻🔄📢: Сброс раунда
    resetRound() {
        if (!this.isHost) return;
        // Отправляем команду сброса всем
        this.players.forEach(p => { if (p.conn) p.conn.send({ type: 'RESET' }); });
        document.getElementById('game-reveal').classList.add('hidden'); // Скрываем у себя🙈
        // Переключаем кнопки управления
        document.getElementById('restart-btn').classList.add('hidden');
        document.getElementById('start-btn').classList.remove('hidden');
    },

    // Отображение роли 👀🃏
    displayRole(role, target) {
        const reveal = document.getElementById('game-reveal');
        const cardBg = document.getElementById('role-card-bg');
        
        reveal.classList.remove('hidden'); // Показываем блок
        document.getElementById('role-title').innerText = "ТВОЯ РОЛЬ 👀: " + role;
        document.getElementById('brawler-name').innerText = target;
        
        // Визуальное отличие для шпиона👀🃏
        if (role === 'ШПИОН 👀') {
            cardBg.classList.add('spy-mode'); // Красный фон🔴
        } else {
            cardBg.classList.remove('spy-mode'); // Оранжевый фон🟠
        }
    },

    // Скрыть роль локально 🙈🃏
    hideRoleLocally() {
        document.getElementById('game-reveal').classList.add('hidden');
    },

    // Обновление списка игроков👥 в UI
    updateUI() {
        const list = document.getElementById('player-list');
        list.innerHTML = this.players.map(p => `<div class="player-item">${p.nick}</div>`).join('');
        document.getElementById('p-count').innerText = this.players.length;
    },

    // Показать экран лобби 👥💬🔑
    showLobby() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
        if (this.isHost) document.getElementById('host-controls').classList.remove('hidden');
    }
};
</script>
</body>
</html>
