<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Spy P2P</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="auth-screen" class="screen">
            <div class="bs-card">
                <h1>BRAWL SPY</h1>
                <input type="text" id="nick-input" placeholder="ТВОЙ НИК..." maxlength="10">
                <div class="buttons-row">
                    <button onclick="Game.initHost()" class="bs-btn blue">СОЗДАТЬ</button>
                    <button onclick="Game.showJoinInput()" class="bs-btn yellow">ВОЙТИ</button>
                </div>
                <div id="join-area" class="hidden">
                    <input type="text" id="room-input" placeholder="КОД КОМНАТЫ">
                    <button onclick="Game.initJoin()" class="bs-btn green">GO</button>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="screen hidden">
            <div class="sidebar">
                <div class="sidebar-header">КЛУБ: <span id="p-count">0</span></div>
                <div id="player-list"></div>
            </div>
            <div class="content">
                <div class="room-info">КОД: <b id="display-room-id">...</b></div>
                
                <div id="host-controls" class="hidden">
                    <button id="start-btn" onclick="Game.startRound()" class="bs-btn green large">ИГРАТЬ</button>
                    <button id="restart-btn" onclick="Game.resetGame()" class="bs-btn blue hidden">НОВЫЙ РАУНД</button>
                </div>

                <div id="game-reveal" class="hidden">
                    <div class="reveal-card" id="card-box">
                        <h2 id="role-title">ТВОЯ РОЛЬ</h2>
                        <h1 id="brawler-name">???</h1>
                        <p id="instruction">Кто-то здесь Леон под инвизом...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
